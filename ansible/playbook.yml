---
# Thin Ansible orchestrator for EC2.
# All runtime-specific behavior lives in `runtimes/<runtime>/*.yml.j2` so that
# editing one language's playbook (e.g. python) cannot affect any other.
- name: Deploy cgoec2local1
  hosts: all
  become: true
  gather_facts: yes
  vars:
    ansible_ssh_retries: 5
    app_dir: /opt/app
    app_port: 3000
    project: 'cgoec2local1'
    web_server: 'nginx'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Wait for SSH to be fully ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _apt_update
      until: _apt_update is succeeded

    # ── Go runtime ────────────────────────────────────────────────────────────
    - name: Check if Go 1.22.5 is already installed
      stat:
        path: /usr/local/go/bin/go
      register: go_installed

    - name: Download Go 1.22.5
      get_url:
        url: 'https://go.dev/dl/go1.22.5.linux-amd64.tar.gz'
        dest: /tmp/go.tar.gz
        mode: '0644'
      when: not go_installed.stat.exists

    - name: Remove old Go installation
      file:
        path: /usr/local/go
        state: absent
      when: not go_installed.stat.exists

    - name: Extract Go
      unarchive:
        src: /tmp/go.tar.gz
        dest: /usr/local
        remote_src: yes
      when: not go_installed.stat.exists

    # ── Local database installation ───────────────────────────────────────────
    - name: Install PostgreSQL server
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is started
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to be ready
      wait_for:
        port: 5432
        host: 127.0.0.1
        timeout: 60

    - name: Create PostgreSQL database and user
      shell: |
        DB_NAME="{{ deploy_db_name | default(project | replace('-', '_') + 'db', true) }}"
        DB_USER="{{ deploy_db_username | default('appuser', true) }}"
        DB_PASS="{{ deploy_db_password | default('apppass', true) }}"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE DATABASE \"$DB_NAME\";"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"$DB_NAME\" TO \"$DB_USER\";"
        sudo -u postgres psql -c "ALTER DATABASE \"$DB_NAME\" OWNER TO \"$DB_USER\";"
      args:
        executable: /bin/bash


    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    - name: Build Go binary from source
      command: /usr/local/go/bin/go build -o app .
      args:
        chdir: "{{ app_dir }}"
      environment:
        CGO_ENABLED: "0"
        GOOS: linux
        GOCACHE: /tmp/.gocache
        GOMODCACHE: /tmp/.gomodcache
        HOME: /root
      register: go_build
      changed_when: true

    - name: Mark Go binary executable
      file:
        path: "{{ app_dir }}/app"
        mode: '0755'

    - name: Create systemd service for Go app
      copy:
        dest: /etc/systemd/system/app.service
        content: |
          [Unit]
          Description={{ project }} Go app
          After=network.target

          [Service]
          User=root
          WorkingDirectory={{ app_dir }}
          Environment=PORT={{ app_port }}
          ExecStart={{ app_dir }}/app
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start Go service
      systemd:
        name: app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload and start web server
      service:
        name: "{{ 'apache2' if (web_server or 'nginx').lower() == 'apache' else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      systemd:
        name: app
        state: restarted
